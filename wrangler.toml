name = "bibliography-search-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
BAIDU_API_KEY = ""
OPENALEX_EMAIL = ""

[[services]]
binding = "SEARCH_RESULTS"
service = "bibliography-search-mcp"

[limits]
skip_validation = true
